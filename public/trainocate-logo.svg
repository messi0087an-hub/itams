    points="13,66 48,20 83,66 69,66 48,42 27,66"
    fill="white"
  />
  <!-- TRAINOCATE wordmark -->
  <text
    x="108"
    y="62"
    font-family="'Helvetica Neue', Arial, Helvetica, sans-serif"
    font-size="28"
