<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 96" width="340" height="96">
  <!-- Orange circle -->
  <circle cx="48" cy="48" r="46" fill="#E85C2C"/>
  <!--
    White upward chevron.
    Outer shape goes:  left-bottom → peak → right-bottom
    Inner notch cuts back up to centre forming the chevron gap.
    Coordinates tuned to match the logo image proportions.
  -->
