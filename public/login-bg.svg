<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <rect width="1440" height="900" fill="#FAFAFA"/>
  <!-- Top-left orange circle (partially off screen) -->
  <circle cx="-20" cy="-20" r="220" fill="#F15A22" opacity="0.9"/>
  <!-- Top-left dot grid -->
  <g fill="#F15A22" opacity="0.3">
    <circle cx="120" cy="60" r="3"/><circle cx="140" cy="60" r="3"/><circle cx="160" cy="60" r="3"/>
    <circle cx="120" cy="80" r="3"/><circle cx="140" cy="80" r="3"/><circle cx="160" cy="80" r="3"/>
    <circle cx="120" cy="100" r="3"/><circle cx="140" cy="100" r="3"/><circle cx="160" cy="100" r="3"/>
  </g>
  <!-- Top-right blue dot grid -->
  <g fill="#3B82F6" opacity="0.25">
    <circle cx="1280" cy="60" r="3"/><circle cx="1300" cy="60" r="3"/><circle cx="1320" cy="60" r="3"/>
    <circle cx="1280" cy="80" r="3"/><circle cx="1300" cy="80" r="3"/><circle cx="1320" cy="80" r="3"/>
    <circle cx="1280" cy="100" r="3"/><circle cx="1300" cy="100" r="3"/><circle cx="1320" cy="100" r="3"/>
  </g>
  <!-- Top-right yellow/gold circle -->
  <circle cx="1500" cy="-30" r="200" fill="#F5A623" opacity="0.9"/>
  <!-- Curved arc line (top) -->
  <path d="M 200 0 Q 600 300 1000 100" stroke="#D0E4F5" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Small orange dot left -->
  <circle cx="185" cy="198" r="10" fill="#F15A22"/>
  <!-- Small orange dot top center -->
  <circle cx="490" cy="70" r="6" fill="#F15A22" opacity="0.7"/>
  <!-- Blue dot left -->
  <circle cx="63" cy="346" r="10" fill="#3B82F6"/>
  <!-- Left light-blue blob -->
  <ellipse cx="-30" cy="700" rx="280" ry="240" fill="#DBEAFE" opacity="0.7"/>
  <!-- Bottom-left dot grid -->
  <g fill="#3B82F6" opacity="0.25">
    <circle cx="50" cy="740" r="3"/><circle cx="70" cy="740" r="3"/><circle cx="90" cy="740" r="3"/>
    <circle cx="50" cy="760" r="3"/><circle cx="70" cy="760" r="3"/><circle cx="90" cy="760" r="3"/>
    <circle cx="50" cy="780" r="3"/><circle cx="70" cy="780" r="3"/><circle cx="90" cy="780" r="3"/>
    <circle cx="110" cy="740" r="3"/><circle cx="130" cy="740" r="3"/><circle cx="150" cy="740" r="3"/>
    <circle cx="110" cy="760" r="3"/><circle cx="130" cy="760" r="3"/><circle cx="150" cy="760" r="3"/>
    <circle cx="110" cy="780" r="3"/><circle cx="130" cy="780" r="3"/><circle cx="150" cy="780" r="3"/>
  </g>
  <!-- Bottom-right orange rectangle -->
  <rect x="1250" y="700" width="300" height="250" rx="40" fill="#F15A22" transform="rotate(-15 1350 800)"/>
  <!-- Right curved arc -->
  <path d="M 1100 500 Q 1300 700 1440 600" stroke="#D0E4F5" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Right orange dot -->
  <circle cx="1374" cy="457" r="10" fill="#F15A22"/>
  <!-- Bottom-right small circle -->
  <circle cx="1083" cy="762" r="8" stroke="#D0E4F5" stroke-width="2" fill="none"/>
  <!-- Top small empty circle -->
  <circle cx="100" cy="597" r="8" stroke="#D0E4F5" stroke-width="2" fill="none"/>
  <!-- Light bulb icon (middle right) -->
  <g transform="translate(1150,660)" opacity="0.6">
    <circle cx="0" cy="-8" r="12" stroke="#F5A623" stroke-width="2" fill="none"/>
    <rect x="-4" y="4" width="8" height="5" rx="1" stroke="#F5A623" stroke-width="1.5" fill="none"/>
    <line x1="0" y1="-20" x2="0" y2="-24" stroke="#F5A623" stroke-width="1.5"/>
    <line x1="-10" y1="-16" x2="-13" y2="-19" stroke="#F5A623" stroke-width="1.5"/>
    <line x1="10" y1="-16" x2="13" y2="-19" stroke="#F5A623" stroke-width="1.5"/>
  </g>
  <!-- Dashed arrow/path -->
  <path d="M 370 140 Q 400 120 430 100 L 480 70" stroke="#F15A22" stroke-width="1.5" fill="none" stroke-dasharray="5,5" opacity="0.7"/>
  <polygon points="480,65 488,75 472,75" fill="#F15A22" opacity="0.7"/>
</svg>
